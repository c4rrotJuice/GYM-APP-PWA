[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/scripts/env.runtime.js"
  [headers.values]
    Cache-Control = "no-store"
