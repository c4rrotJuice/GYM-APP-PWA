<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Gym PWA app shell for authenticated gym operations.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym PWA">
    <title>Gym PWA App</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/scripts/env.runtime.js"></script>
    <script type="module" src="/scripts/app.js"></script>
  </head>
  <body class="app-body">
    <a class="skip-link" href="#app-view">Skip to content</a>
    <aside class="install-banner install-banner-compact" data-install-banner hidden aria-label="Install Gym PWA">
      <div>
        <strong>Install Gym PWA</strong>
        <span data-install-status>Keep the dashboard available from your home screen.</span>
      </div>
      <div class="install-banner-actions">
        <button class="button button-primary" type="button" data-install-button>Install</button>
        <button class="icon-button icon-button-light" type="button" data-install-dismiss aria-label="Dismiss install prompt">x</button>
      </div>
    </aside>
    <div class="app-shell" data-standalone="false">
      <header class="app-topbar">
        <a class="brand" href="/app.html#dashboard" aria-label="Gym PWA dashboard">
          <img src="/assets/icon.svg" alt="" width="34" height="34">
          <span>Gym PWA</span>
        </a>
        <div class="topbar-actions">
          <span class="account-pill" data-account-pill hidden></span>
          <span class="connection-status" data-connection-status>Online</span>
          <button class="icon-button" type="button" data-install-button hidden aria-label="Install app">
            <span aria-hidden="true">+</span>
          </button>
          <button class="button button-secondary logout-button" type="button" data-logout-button>
            Log out
          </button>
        </div>
      </header>

      <main id="app-view" class="app-content" tabindex="-1" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="App sections">
        <a href="#dashboard" data-route="dashboard" aria-current="page">Dashboard</a>
        <a href="#members" data-route="members">Users</a>
        <a href="#memberships" data-route="memberships">Memberships</a>
        <a href="#attendance" data-route="attendance">Attendance</a>
        <a href="#workouts" data-route="workouts">Workouts</a>
        <a href="#settings" data-route="settings">Settings</a>
      </nav>
    </div>
  </body>
</html>
